<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>linsi.e</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <div class="left"></div>

    <div class="center">

        <!-- ЛОГО -->
        <div class="logo">linsi.e</div>

        <!-- ПЛЕЕР -->
        <div class="player">
            <button id="prev">⏮</button>
            <button id="play">▶</button>
            <button id="next">⏭</button>

            <span id="track-name">no track</span>

            <input type="range" id="progress" value="0">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
        </div>

        <audio id="audio"></audio>

        <div class="content">

            <!-- МЕНЮ -->
            <nav>
                <a href="#" data-page="home">home</a>
                <a href="#" data-page="music">music</a>
                <a href="#" data-page="blog">blog</a>
                <a href="#" data-page="links">links</a>
            </nav>
            
            <div id="page-content"></div>
            
            <!-- ПРОФИЛЬ -->
            <div class="profile">
                <img src="assets/avatar.jpg">
                <div class="updates">
                    <div class="updates-title">Last updates:</div>
                    <div class="updates-list">
                        <p>+ added track</p>
                        <p>+ fixed layout</p>
                        <p>+ new blog post</p>
                    </div>
                </div>
            </div>

            <!-- ПРИВЕТ -->
            <div class="welcome">
                Привет!<br>
                Добро пожаловать на мой сайт!
            </div>

            <!-- ПУСТОЕ МЕСТО -->
            <div class="spacer"></div>

            <!-- НИЗ -->
            <div class="footer">

                <div class="counter">
                    <img src="https://hitwebcounter.com/counter/counter.php?page=21484535&style=0024&nbdigits=5&type=page&initCount=0">
                </div>

                <div class="song">
                    song of the day: Сергей Курёхин — Лето
                </div>

            </div>

        </div>

    </div>

    <div class="right"></div>

</div>

</body>
</html>
