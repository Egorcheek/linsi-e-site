<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>linsi.e</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Фоновая музыка -->
<div class="music-player">
    <button id="playBtn">▶</button>
    <span class="track-name">track: your song</span>
    <audio id="bgMusic" src="assets/music.mp3"></audio>
</div>

<div class="container">

    <!-- Правая панель -->
    <div class="right-panel">

        <h1 class="logo">linsi.e</h1>

        <nav>
            <a href="#">music</a>
            <a href="#">blog</a>
            <a href="#">links</a>
        </nav>

        <div class="profile">
            <img src="assets/avatar.jpg" alt="avatar">
            <div class="updates">
                <p class="updates-title">Last updates:</p>
                <div class="updates-list">
                    <p>+ added track</p>
                    <p>+ fixed layout</p>
                    <p>+ new blog post</p>
                    <p>+ something else</p>
                </div>
            </div>
        </div>

        <div class="welcome">
            <p>Привет!<br>Добро пожаловать на мой сайт!</p>
        </div>

        <div class="song">
            <p>song of the day: ...</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
